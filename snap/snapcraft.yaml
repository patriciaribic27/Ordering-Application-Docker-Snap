name: ordering-application
title: Ordering Application
base: core22
version: '1.0.0'
summary: Cafe ordering application
description: |
  Cafe ordering application with REST API and Tkinter GUI.
  Built for Operativni sustavi course at Mathos.

license: MIT
contact: patriciaribic27@gmail.com
source-code: https://github.com/patriciaribic27/Ordering-Application-Docker-Snap

grade: stable
confinement: strict

apps:
  api-server:
    command: bin/python3 $SNAP/services/api_server.py
    daemon: simple
    install-mode: enable
    plugs:
      - network
      - network-bind
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8080"
      PYTHONPATH: "$SNAP:$SNAP/lib/python3.10/site-packages:$SNAP/usr/lib/python3/dist-packages"

parts:
  ordering-app:
    plugin: python
    source: .
    python-packages:
      - aiohttp
    stage-packages:
      - python3
      - python3-tk
      - tcl8.6
      - tk8.6
      - libx11-6
      - libxext6
      - libxrender1
      - libxtst6
      - libxi6
      - python3-aiohttp  

